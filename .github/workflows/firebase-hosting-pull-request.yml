# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools
# Workflow de previsualizacion: crea un preview de Firebase Hosting para cada PR.


name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    # Solo ejecuta previews para PRs creadas desde el mismo repositorio.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      # Descarga el codigo de la PR.
      - uses: actions/checkout@v4
      # Instala dependencias de forma reproducible y compila la app.
      - run: npm ci && npm run build
      # Publica una URL temporal de preview en Firebase Hosting.
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DIGITALIZACION_TSINGE_FUSION }}
          projectId: digitalizacion-tsinge-fusion
