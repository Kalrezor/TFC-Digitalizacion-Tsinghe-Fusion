# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools
# Workflow de produccion: compila y despliega Firebase Hosting al hacer push a main.

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      # Descarga el codigo del repositorio en la maquina de GitHub Actions.
      - uses: actions/checkout@v4
      # Instala dependencias del frontend.
      - name: Install dependencies
        run: npm install
      # Genera la carpeta build que Firebase Hosting publicara.
      - name: Build app
        run: npm run build
        env:
          CI: "false"
      # Autentica contra Google Cloud/Firebase usando el secreto del repositorio.
      - name: Authenticate Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DIGITALIZACION_TSINGE_FUSION }}
      # Publica el contenido de build en Firebase Hosting.
      - name: Deploy to Firebase Hosting
        run: npx -y firebase-tools@latest deploy --only hosting --project digitalizacion-tsinge-fusion
