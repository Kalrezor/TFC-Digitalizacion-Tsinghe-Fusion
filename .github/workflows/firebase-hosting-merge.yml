# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install
      - name: Build app
        run: npm run build
        env:
          CI: "false"
      - name: Authenticate Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DIGITALIZACION_TSINGE_FUSION }}
      - name: Deploy to Firebase Hosting
        run: npx -y firebase-tools@latest deploy --only hosting --project digitalizacion-tsinge-fusion
